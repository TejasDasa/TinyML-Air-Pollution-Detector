; Air Pollution Detector Firmware
; ESP32 + BME688 + SEN50 + SCD40 + TFLite Micro + BLE
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    ; Pin definitions
    -DI2C_SDA=21
    -DI2C_SCL=22
    ; BLE device name
    -DBLE_DEVICE_NAME='"AirGuard"'
    ; Sensor sampling intervals (ms)
    -DSEN50_INTERVAL_MS=2000
    -DSCD40_INTERVAL_MS=5000
    ; BLE notification interval (ms)
    -DBLE_NOTIFY_INTERVAL_MS=5000
    ; Exposure tracker
    -DEXPOSURE_WINDOW_MINUTES=60

lib_deps =
    ; BME688 with BSEC2 IAQ algorithm (Bosch)
    boschsensortec/BSEC2 Arduino Library @ ^1.8.2610
    ; SEN50 particulate + VOC/NOx sensor (Sensirion)
    sensirion/Sensirion I2C SEN5X @ ^0.3.0
    sensirion/Sensirion Core       @ ^0.7.1
    ; SCD40 CO2 sensor (Sensirion)
    sensirion/Sensirion I2C SCD4x  @ ^0.4.0
    ; TensorFlow Lite Micro
    eloquentarduino/EloquentTinyML @ ^0.0.3

; BSEC2 requires the Bosch binary library – link it for ESP32
lib_archive = false

; Extra BSEC2 include path needed by PlatformIO
build_unflags = -std=gnu++11
